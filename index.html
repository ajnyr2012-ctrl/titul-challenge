            { brawler: "Луми", normal: "Хедбэнгинг", neon: "И тепло, и холодно" },
            { brawler: "Спайк", normal: "Один такой", neon: "Нет слов" },
            { brawler: "Ворон", normal: "Токсик", neon: "Змея" },
            { brawler: "Леон", normal: "Проныра", neon: "Вот я есть, а вот меня нет…" },
            { brawler: "Сэнди", normal: "Соня", neon: "Сплю" },
            { brawler: "Амбер", normal: "Зажигалка", neon: "Жгу!" },
            { brawler: "Мэг", normal: "Техподдержка 2.0", neon: "Тяжелый металл" },
            { brawler: "Вольт", normal: "Бро", neon: "Электрик" },
            { brawler: "Честер", normal: "Мастер на все руки", neon: "Джокер" },
            { brawler: "Корделиус", normal: "Токсичный", neon: "Хранитель грибниц" },
            { brawler: "Кит", normal: "Мяу", neon: "Рыбовое" },
            { brawler: "Драко", normal: "Хозяин подземелья", neon: "Металлист" },
            { brawler: "Кэндзи", normal: "Самурай", neon: "Суши-мастер" },
            { brawler: "Кадзэ", normal: "Писаю в бассейн", neon: "Плохой полицейский" },
            { brawler: "Сириус", normal: "Ниндзя", neon: "Словно ветер" }
        ];

        // ---------- РАНГИ БОЙЦОВ (по списку) ----------
        const rankMap = new Map();
        // S
        ['Мортис','Нани','Булл','Ворон','Кольт','Леон','Биби'].forEach(b => rankMap.set(b, 'S'));
        // A
        ['Клэнси','Спайк','Честер','Сириус','Базз','Эмз','Брок'].forEach(b => rankMap.set(b, 'A'));
        // B
        ['Мелоди','Мэнди','Бо','Беа','Рико','Кадзэ','Шелли','Мэйси','Сту','Мипл','Байрон','Пайпер','Белль','Фрэнк','Джин','Джанет','Лола','Джуджу','Бонни','Джесси','Нита','Отис','Эдгар','Бастер','Лили'].forEach(b => rankMap.set(b, 'B'));
        // C
        ['Анджело','Роза','Даг','Финкс','Пенни','Скуик','Перл','Кэндзи','Корделиус','Мэг','Мо','Чарли','Лу','R-T','Джеки','Фэнг','Пэм','Гас','8-БИТ','Транк','Сэнди','Поко'].forEach(b => rankMap.set(b, 'C'));
        // D
        ['Амбер','Эш','Ева','Макс','Луми','Шейд','Карл','Мистер П.','Тик','Хэнк','Мико','Эль Примо','Драко','Гэйл'].forEach(b => rankMap.set(b, 'D'));
        // F
        ['Нани','Грей','Дэррил','Грифф','Тара','Олли','Динамайк','Сэм','Колетт','Ларри и Лори','Виллоу','Спраут','Гром','Берри','Барли','Чак'].forEach(b => rankMap.set(b, 'F'));

        // Защита от отсутствующих
        TITLES_LIBRARY.forEach(entry => {
            if (!rankMap.has(entry.brawler)) rankMap.set(entry.brawler, 'F');
        });

        // ---------- ГЕНЕРАЦИЯ СЕКТОРОВ ПО УРОВНЮ ----------
        function buildSectorsForLevel(level) {
            const sectors = [];
            TITLES_LIBRARY.forEach(entry => {
                const rank = rankMap.get(entry.brawler);
                let includeNormal = false;
                let includeNeon = false;

                if (level === 'novice') {
                    if (rank === 'S' || rank === 'A') includeNormal = true;
                } else if (level === 'master') {
                    if (rank === 'B' || rank === 'C') {
                        includeNormal = true;
                        includeNeon = true;
                    }
                } else if (level === 'old') {
                    if (rank === 'D' || rank === 'F') {
                        includeNeon = true;   // ТОЛЬКО третий прайм
                    }
                }

                if (includeNormal) {
                    sectors.push({
                        id: `${entry.brawler}_normal_${level}`,
                        title: entry.normal,
                        brawler: entry.brawler,
                        type: "🏆 ПРАЙМ I (Мастерство) 🏆"
                    });
                }
                if (includeNeon) {
                    sectors.push({
                        id: `${entry.brawler}_neon_${level}`,
                        title: entry.neon,
                        brawler: entry.brawler,
                        type: "✨ ПРАЙМ III (Неоновый престиж) ✨"
                    });
                }
            });
            return shuffleArray(sectors);
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // ---------- DOM ЭЛЕМЕНТЫ ----------
        const wheelStrip = document.getElementById('wheelStrip');
        const spinBtn = document.getElementById('spinBtn');
        const titleDisplay = document.getElementById('titleDisplay');
        const brawlerDisplay = document.getElementById('brawlerDisplay');
        const prestigeType = document.getElementById('prestigeType');
        const resultCard = document.getElementById('resultCard');
        const levelBtns = document.querySelectorAll('.level-btn');

        let currentLevel = 'novice';
        let flatSectors = buildSectorsForLevel(currentLevel);
        let duplicatedSectors = [];
        for (let i = 0; i < 15; i++) duplicatedSectors.push(...flatSectors);

        const itemWidth = 188;
        let currentTranslateX = 0;
        let spinningActive = false;
        let animFrame = null;
        let spinStartTime = 0;
        const spinDuration = 2000;
        let startTranslate = 0;
        let targetTranslate = 0;
        let spinUsed = false;
        let lastSelectedId = null;

        function renderStrip() {
            wheelStrip.innerHTML = '';
            duplicatedSectors.forEach(sector => {
                const card = document.createElement('div');
                card.className = 'sector-card';
                card.innerHTML = `
                    <span class="title-text">${sector.title.length > 28 ? sector.title.slice(0,26)+'..' : sector.title}</span>
                    <span class="brawler-mini">${sector.brawler}</span>
                `;
                wheelStrip.appendChild(card);
            });
            const startOffset = -(flatSectors.length * 7 * itemWidth);
            wheelStrip.style.transform = `translateX(${startOffset}px)`;
            currentTranslateX = startOffset;
        }

        function highlightCenterCard() {
            const cards = document.querySelectorAll('.sector-card');
            cards.forEach(c => c.classList.remove('highlight'));
            const idx = getCentralSectorIndex();
            if (idx !== -1 && cards[idx]) cards[idx].classList.add('highlight');
        }

        function getCentralSectorIndex() {
            const track = document.querySelector('.wheel-track');
            if (!track) return -1;
            const rect = track.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const cards = document.querySelectorAll('.sector-card');
            let best = -1, minDist = Infinity;
            for (let i = 0; i < cards.length; i++) {
                const cardRect = cards[i].getBoundingClientRect();
                const cardCenter = cardRect.left + cardRect.width / 2;
                const dist = Math.abs(cardCenter - centerX);
                if (dist < minDist) { minDist = dist; best = i; }
            }
            return best;
        }

        function ensureRightSideFilled(centralIdx) {
            const track = document.querySelector('.wheel-track');
            if (!track) return false;
            const containerRect = track.getBoundingClientRect();
            const containerRight = containerRect.right;
            const cards = document.querySelectorAll('.sector-card');
            if (cards.length === 0) return false;
            const centralCard = cards[centralIdx];
            const centralRect = centralCard.getBoundingClientRect();
            if (centralRect.right > containerRight - 10) {
                currentTranslateX += flatSectors.length * itemWidth;
                wheelStrip.style.transform = `translateX(${currentTranslateX}px)`;
                return true;
            }
            let rightCount = 0;
            for (let i = centralIdx + 1; i < cards.length; i++) {
                if (cards[i].getBoundingClientRect().left < containerRight) rightCount++;
                else break;
            }
            if (rightCount < 2) {
                currentTranslateX += flatSectors.length * itemWidth;
                wheelStrip.style.transform = `translateX(${currentTranslateX}px)`;
                return true;
            }
            return false;
        }

        function updateResult() {
            let idx = getCentralSectorIndex();
            if (idx === -1 || !duplicatedSectors[idx]) return;
            if (ensureRightSideFilled(idx)) idx = getCentralSectorIndex();
            const sector = duplicatedSectors[idx];
            titleDisplay.textContent = sector.title;
            brawlerDisplay.textContent = `👤 ${sector.brawler}`;
            prestigeType.textContent = sector.type;
            lastSelectedId = sector.id;
            highlightCenterCard();
            resultCard.classList.add('glow-effect');
            setTimeout(() => resultCard.classList.remove('glow-effect'), 500);
        }

        function snapToExactCenter() {
            const idx = getCentralSectorIndex();
            if (idx === -1) return;
            const cards = document.querySelectorAll('.sector-card');
            const targetCard = cards[idx];
            const track = document.querySelector('.wheel-track');
            const containerRect = track.getBoundingClientRect();
            const cardRect = targetCard.getBoundingClientRect();
            const containerCenter = containerRect.left + containerRect.width / 2;
            const cardCenter = cardRect.left + cardRect.width / 2;
            currentTranslateX -= (cardCenter - containerCenter);
            wheelStrip.style.transform = `translateX(${currentTranslateX}px)`;
        }

        function animateSpin(now) {
            if (!spinningActive) return;
            const elapsed = now - spinStartTime;
            const t = Math.min(1, elapsed / spinDuration);
            const ease = 1 - Math.pow(1 - t, 3);
            const newX = startTranslate + (targetTranslate - startTranslate) * ease;
            wheelStrip.style.transform = `translateX(${newX}px)`;
            currentTranslateX = newX;
            if (t < 1) {
                animFrame = requestAnimationFrame(animateSpin);
            } else {
                wheelStrip.style.transform = `translateX(${targetTranslate}px)`;
                currentTranslateX = targetTranslate;
                spinningActive = false;
                snapToExactCenter();
                updateResult();
                cancelAnimationFrame(animFrame);
                animFrame = null;
            }
        }

        function spinWheel() {
            if (spinningActive || spinUsed) return;
            if (!flatSectors.length) {
                alert('Нет доступных титулов для этого уровня!');
                return;
            }
            spinUsed = true;
            spinBtn.disabled = true;

            const randomIndex = Math.floor(Math.random() * flatSectors.length);
            const targetSector = flatSectors[randomIndex];
            
            let targetDuplicatedIndex = -1;
            const startSearch = flatSectors.length * 7;
            const endSearch = flatSectors.length * 8;
            for (let i = startSearch; i < endSearch; i++) {
                if (duplicatedSectors[i].id === targetSector.id) {
                    targetDuplicatedIndex = i;
                    break;
                }
            }
            if (targetDuplicatedIndex === -1) {
                for (let i = 0; i < duplicatedSectors.length; i++) {
                    if (duplicatedSectors[i].id === targetSector.id) {
                        targetDuplicatedIndex = i;
                        break;
                    }
                }
            }
            if (targetDuplicatedIndex === -1) return;

            const track = document.querySelector('.wheel-track');
            const cards = document.querySelectorAll('.sector-card');
            const targetCard = cards[targetDuplicatedIndex];
            const containerRect = track.getBoundingClientRect();
            const cardRect = targetCard.getBoundingClientRect();
            const containerCenter = containerRect.left + containerRect.width / 2;
            const cardCenter = cardRect.left + cardRect.width / 2;
            const desiredTranslate = currentTranslateX - (cardCenter - containerCenter);
            const fullRotations = 5 + Math.floor(Math.random() * 6);
            const extraShift = fullRotations * (flatSectors.length * itemWidth);
            const finalTranslate = desiredTranslate - extraShift;

            startTranslate = currentTranslateX;
            targetTranslate = finalTranslate;
            spinStartTime = performance.now();
            spinningActive = true;

            titleDisplay.textContent = "🌀 SPINNING... 🌀";
            brawlerDisplay.textContent = "Крутим рулетку";
            prestigeType.textContent = "⚡ СТАВКИ СДЕЛАНЫ ⚡";

            if (animFrame) cancelAnimationFrame(animFrame);
            animFrame = requestAnimationFrame(animateSpin);
        }

        function setLevel(level) {
            currentLevel = level;
            flatSectors = buildSectorsForLevel(level);
            duplicatedSectors = [];
            for (let i = 0; i < 15; i++) duplicatedSectors.push(...flatSectors);
            renderStrip();
            spinUsed = false;
            spinBtn.disabled = false;
            titleDisplay.textContent = "—";
            brawlerDisplay.textContent = "Выбери уровень и крути";
            prestigeType.textContent = "✨ — ✨";
            document.querySelectorAll('.sector-card').forEach(c => c.classList.remove('highlight'));
        }

        // Инициализация
        levelBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                levelBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                setLevel(btn.dataset.level);
            });
        });

        spinBtn.addEventListener('click', spinWheel);
        window.addEventListener('resize', () => {
            if (spinningActive) return;
            if (spinUsed) {
                snapToExactCenter();
                updateResult();
            }
        });

        setLevel('novice');
    })();
</script>
</body>
</html>
