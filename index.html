<html lang="ru">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        * {

            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1a, #03060b);
            font-family: 'Orbitron', 'Rajdhani', 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg, rgba(0, 255, 255, 0.02) 0px, rgba(0, 255, 255, 0.02) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 0;
        }

        .glow-orb {
            position: absolute;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(255, 80, 40, 0.15), transparent 70%);
            top: -20%;
            right: -20%;
            border-radius: 50%;
            filter: blur(60px);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            width: 100%;
            background: rgba(5, 10, 18, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 64px;
            padding: 24px 30px 40px;
            border: 1px solid rgba(0, 255, 255, 0.4);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 215, 0, 0.2) inset, 0 0 20px rgba(0, 255, 255, 0.2);
            transition: all 0.3s;
            position: relative;
            z-index: 2;
        }

        .title-section {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Poppins', sans-serif;
            font-weight: 900;
            font-size: 3.2rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #FFF3B0, #FFB347, #FF6A00, #FFD966);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(255, 140, 0, 0.7);
            margin: 0;
            line-height: 1.2;
            animation: textShift 5s infinite alternate;
        }

        @keyframes textShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .main-layout {
            display: flex;
            flex-direction: row;
            align-items: stretch;
            gap: 20px;
            margin: 20px 0 10px;
        }

        .wheel-area {
            flex: 3;
            min-width: 0;
        }

        .nearby-area {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 18px 12px;
            border: 1px solid #ffb34780;
            box-shadow: inset 0 0 15px #00000055, 0 8px 0 #0a0f1a;
            display: flex;
            flex-direction: column;
        }

        .nearby-title {
            text-align: center;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            color: #FFD966;
            text-shadow: 0 0 6px #ff9900;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .nearby-slots {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }

        .nearby-card {
            background: linear-gradient(145deg, #1e2a2f, #0f191f);
            border-radius: 24px;
            padding: 12px 8px;
            border: 1px solid #ffc85080;
            box-shadow: 0 4px 0 #00000066;
            transition: 0.1s;
            text-align: center;
        }

        .nearby-label {
            font-size: 0.75rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .nearby-title-text {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            color: #FFE3A4;
            text-shadow: 0 1px 3px black;
            word-break: break-word;
        }

        .nearby-brawler {
            font-size: 0.8rem;
            color: #8ac4ff;
            margin-top: 4px;
        }

        .wheel-horizontal-container {
            position: relative;
            background: #010a12;
            border-radius: 60px;
            padding: 18px 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,200,0.2);
            border: 1px solid #ffb34760;
        }

        .wheel-track {
            overflow: hidden;
            border-radius: 48px;
            background: #0b121f;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            position: relative;
            cursor: pointer;
        }

        .wheel-strip {
            display: flex;
            gap: 0;
            will-change: transform;
            transition: none;
        }

        .sector-card {
            flex: 0 0 auto;
            width: 180px;
            background: linear-gradient(145deg, #1e2a2f, #0f191f);
            margin: 0 4px;
            border-radius: 36px;
            padding: 16px 8px;
            text-align: center;
            border: 1px solid rgba(255, 200, 80, 0.5);
            box-shadow: 0 8px 0 #00000055;
            transition: border 0.2s, box-shadow 0.2s, transform 0.2s;
            backdrop-filter: blur(4px);
        }

        .sector-card.highlight {
            border: 3px solid #FFD966;
            box-shadow: 0 0 20px #FFB347, 0 8px 0 #00000055;
            transform: scale(1.02);
            background: linear-gradient(145deg, #2a3a44, #14232b);
        }

        .sector-card span.title-text {
            display: block;
            font-weight: 800;
            font-size: 1rem;
            color: #FFE3A4;
            text-shadow: 0 1px 2px black;
            font-family: 'Poppins', sans-serif;
            word-break: break-word;
        }

        .sector-card span.brawler-mini {
            font-size: 0.7rem;
            color: #8ac4ff;
            font-weight: 500;
            margin-top: 8px;
            display: block;
        }

        .pointer-indicator {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            z-index: 25;
            filter: drop-shadow(0 0 12px #ffaa00);
            pointer-events: none;
        }

        .pointer-indicator svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .control-area {
            display: flex;
            justify-content: center;
            margin: 30px 0 20px;
        }

        .spin-btn {
            background: radial-gradient(circle at 30% 20%, #ffbc6e, #e05a00);
            border: none;
            padding: 16px 44px;
            font-size: 1.8rem;
            font-weight: bold;
            font-family: 'Orbitron', monospace;
            color: #fff0c0;
            text-shadow: 0 2px 0 #722400;
            border-radius: 80px;
            cursor: pointer;
            transition: 0.07s linear;
            box-shadow: 0 12px 0 #8b3c00;
            letter-spacing: 4px;
        }

        .spin-btn:active {
            transform: translateY(4px);
            box-shadow: 0 6px 0 #8b3c00;
        }

        .spin-btn:disabled {
            opacity: 0.5;
            transform: translateY(0);
            filter: grayscale(0.5);
            cursor: not-allowed;
            background: radial-gradient(circle at 30% 20%, #8f8f8f, #5a5a5a);
            box-shadow: 0 12px 0 #3a3a3a;
            text-shadow: none;
        }

        .result-card {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 18px 20px;
            margin-top: 20px;
            text-align: center;
            border: 1px solid #ffbc6e;
            box-shadow: 0 0 18px rgba(255, 100, 0, 0.3);
        }

        .result-label {
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: #ffcf8a;
            font-weight: 500;
        }

        .title-name {
            font-family: 'Poppins', sans-serif;
            font-weight: 900;
            font-size: 2.2rem;
            background: linear-gradient(135deg, #FFF5C2, #FFAA55);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
            margin: 6px 0;
        }

        .brawler-name {
            font-size: 1.25rem;
            color: #bbddff;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .prestige-badge {
            display: inline-block;
            background: #1a1f1a;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 12px;
            color: #FFB347;
            border-left: 4px solid gold;
            font-family: monospace;
        }

        footer {
            text-align: center;
            font-size: 0.65rem;
            color: #5e7a5e;
            margin-top: 28px;
            opacity: 0.6;
        }

        @media (max-width: 900px) {
            .main-layout {
                flex-direction: column;
            }
            .nearby-area {
                margin-top: 10px;
            }
            h1 {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 760px) {
            .container {
                padding: 18px 12px 28px;
            }
            h1 {
                font-size: 2rem;
            }
            .sector-card {
                width: 140px;
                padding: 12px 5px;
            }
            .sector-card span.title-text {
                font-size: 0.8rem;
            }
            .title-name {
                font-size: 1.5rem;
            }
            .spin-btn {
                padding: 12px 28px;
                font-size: 1.4rem;
            }
            .pointer-indicator {
                top: -24px;
                width: 48px;
                height: 48px;
            }
        }

        .glow-effect {
            animation: winFlash 0.4s cubic-bezier(0.2, 1.6, 0.4, 1);
        }

        @keyframes winFlash {
            0% { text-shadow: 0 0 0px gold; transform: scale(1);}
            50% { text-shadow: 0 0 20px #ffb347, 0 0 30px #ff7b00; transform: scale(1.02);}
            100% { text-shadow: 0 0 0px gold; transform: scale(1);}
        }
    </style>
</head>

                                <stop offset="40%" stop-color="#FFB347"/>
                                <stop offset="100%" stop-color="#FF4D00"/>

                            <filter id="glow">
                                <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                                <feMerge>
                                    <feMergeNode in="coloredBlur"/>
                                    <feMergeNode in="SourceGraphic"/>

</div>

        { brawler: "Корделиус", normal: "Токсичный", neon: "Хранитель грибниц" },
        { brawler: "Кит", normal: "Мяу", neon: "Рыбовое" },
        { brawler: "Драко", normal: "Хозяин подземелья", neon: "Металлист" },
        { brawler: "Кэндзи", normal: "Самурай", neon: "Суши-мастер" },
        { brawler: "Кадзэ", normal: "Писаю в бассейн", neon: "Плохой полицейский" },
        { brawler: "Сириус", normal: "Ниндзя", neon: "Словно ветер" }
    ];

    // Формируем плоский массив секторов
    let flatSectors = [];
    TITLES_LIBRARY.forEach(entry => {
        flatSectors.push({
            id: `${entry.brawler}_normal`,
            title: entry.normal,
            brawler: entry.brawler,
            type: "🏆 ПРАЙМ I (Мастерство) 🏆"
        });
        flatSectors.push({
            id: `${entry.brawler}_neon`,
            title: entry.neon,
            brawler: entry.brawler,
            type: "✨ ПРАЙМ III (Неоновый престиж) ✨"
        });
    });

    // Перемешиваем
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    flatSectors = shuffleArray(flatSectors);

    // 15 КОПИЙ ДЛЯ ОГРОМНОГО ЗАПАСА
    let duplicatedSectors = [];
    for (let i = 0; i < 15; i++) {
        duplicatedSectors.push(...flatSectors);
    }
    
    const itemWidth = 188; // 180 + 4*2

    // DOM элементы
    const wheelStrip = document.getElementById('wheelStrip');
    const spinBtn = document.getElementById('spinBtn');
    const titleDisplaySpan = document.getElementById('titleDisplay');
    const brawlerDisplaySpan = document.getElementById('brawlerDisplay');
    const prestigeTypeSpan = document.getElementById('prestigeType');
    const resultCardDiv = document.getElementById('resultCard');
    const leftTitle = document.getElementById('leftTitle');
    const leftBrawler = document.getElementById('leftBrawler');
    const rightTitle = document.getElementById('rightTitle');
    const rightBrawler = document.getElementById('rightBrawler');

    let currentTranslateX = 0;
    let spinningActive = false;
    let animFrame = null;
    let spinStartTime = 0;
    const spinDuration = 2000;
    let startTranslate = 0;
    let targetTranslate = 0;

    // ФЛАГ ОДНОЙ ПОПЫТКИ
    let spinUsed = false;
    let lastSelectedId = null;

    function renderStrip() {
        wheelStrip.innerHTML = '';
        duplicatedSectors.forEach((sector) => {
            const card = document.createElement('div');
            card.className = 'sector-card';
            card.innerHTML = `
                <span class="title-text">${sector.title.length > 28 ? sector.title.slice(0,26)+'..' : sector.title}</span>
                <span class="brawler-mini">${sector.brawler}</span>
            `;
            wheelStrip.appendChild(card);
        });
        
        // Стартовое смещение: берём 7-ю копию (индекс 6) для огромного запаса с обеих сторон
        const startOffset = -(flatSectors.length * 7 * itemWidth);
        wheelStrip.style.transform = `translateX(${startOffset}px)`;
        currentTranslateX = startOffset;
    }

    function highlightCenterCard() {
        const cards = document.querySelectorAll('.sector-card');
        cards.forEach(card => card.classList.remove('highlight'));
        const idx = getCentralSectorIndex();
        if (idx !== -1 && cards[idx]) {
            cards[idx].classList.add('highlight');
        }
    }

    function getCentralSectorIndex() {
        const trackContainer = document.querySelector('.wheel-track');
        if (!trackContainer) return -1;
        const containerRect = trackContainer.getBoundingClientRect();
        const centerX = containerRect.left + containerRect.width / 2;
        const cards = document.querySelectorAll('.sector-card');
        let bestIdx = -1;
        let minDist = Infinity;
        for (let i = 0; i < cards.length; i++) {
            const rect = cards[i].getBoundingClientRect();
            const cardCenter = rect.left + rect.width / 2;
            const dist = Math.abs(cardCenter - centerX);
            if (dist < minDist) {
                minDist = dist;
                bestIdx = i;
            }
        }
        return bestIdx;
    }

    // Проверяем, достаточно ли секторов справа от центрального
    function ensureRightSideFilled(centralIdx) {
        const trackContainer = document.querySelector('.wheel-track');
        if (!trackContainer) return false;
        const containerRect = trackContainer.getBoundingClientRect();
        const containerRightEdge = containerRect.right;
        
        // Сколько карточек нужно, чтобы заполнить правую половину контейнера
        // Будем проверять, что от центральной карточки вправо есть хотя бы 3 карточки
        const cards = document.querySelectorAll('.sector-card');
        if (cards.length === 0) return false;
        
        const centralCard = cards[centralIdx];
        const centralRect = centralCard.getBoundingClientRect();
        
        // Если правая граница центральной карточки уже за пределами видимости справа — смещаем влево
        if (centralRect.right > containerRightEdge - 10) {
            // Сдвигаем на одну длину массива влево
            currentTranslateX += flatSectors.length * itemWidth;
            wheelStrip.style.transform = `translateX(${currentTranslateX}px)`;
            // После сдвига нужно пересчитать центральный индекс
            return true;
        }
        
        // Дополнительно: если справа от центра меньше 2 карточек, тоже сдвигаем
        let rightCount = 0;
        for (let i = centralIdx + 1; i < cards.length; i++) {
            const rect = cards[i].getBoundingClientRect();
            if (rect.left < containerRightEdge) rightCount++;
            else break;
        }
        if (rightCount < 2) {
            currentTranslateX += flatSectors.length * itemWidth;
            wheelStrip.style.transform = `translateX(${currentTranslateX}px)`;
            return true;
        }
        return false;
    }

    function updateResultAndNearby() {
        let idx = getCentralSectorIndex();
        if (idx === -1 || !duplicatedSectors[idx]) return;

        // Гарантируем, что справа есть карточки
        if (ensureRightSideFilled(idx)) {
            // Если произошёл сдвиг, пересчитываем индекс
            idx = getCentralSectorIndex();
        }

        const sector = duplicatedSectors[idx];
        titleDisplaySpan.innerHTML = sector.title;
        brawlerDisplaySpan.innerHTML = `👤 ${sector.brawler}`;
        prestigeTypeSpan.innerHTML = sector.type;
        lastSelectedId = sector.id;

        highlightCenterCard();

        const leftIdx = idx > 0 ? idx - 1 : duplicatedSectors.length - 1;
        const rightIdx = idx < duplicatedSectors.length - 1 ? idx + 1 : 0;

        const leftSector = duplicatedSectors[leftIdx];
        const rightSector = duplicatedSectors[rightIdx];

        leftTitle.textContent = leftSector.title.length > 25 ? leftSector.title.slice(0,23)+'..' : leftSector.title;
        leftBrawler.textContent = leftSector.brawler;
        rightTitle.textContent = rightSector.title.length > 25 ? rightSector.title.slice(0,23)+'..' : rightSector.title;
        rightBrawler.textContent = rightSector.brawler;

        resultCardDiv.classList.add('glow-effect');
        setTimeout(() => resultCardDiv.classList.remove('glow-effect'), 500);
    }

    function snapToExactCenter() {
        const idx = getCentralSectorIndex();
        if (idx === -1) return;
        const cards = document.querySelectorAll('.sector-card');
        const targetCard = cards[idx];
        if (!targetCard) return;
        const trackContainer = document.querySelector('.wheel-track');
        const containerRect = trackContainer.getBoundingClientRect();
        const cardRect = targetCard.getBoundingClientRect();
        const containerCenter = containerRect.left + containerRect.width / 2;
        const cardCenter = cardRect.left + cardRect.width / 2;
        const delta = cardCenter - containerCenter;
        currentTranslateX -= delta;
        wheelStrip.style.transform = `translateX(${currentTranslateX}px)`;
    }

    function animateSpin(currentTime) {
        if (!spinningActive) return;
        const elapsed = currentTime - spinStartTime;
        let t = Math.min(1, elapsed / spinDuration);
        const easeOut = 1 - Math.pow(1 - t, 3);
        const newX = startTranslate + (targetTranslate - startTranslate) * easeOut;
        wheelStrip.style.transform = `translateX(${newX}px)`;
        currentTranslateX = newX;
        if (t < 1) {
            animFrame = requestAnimationFrame(animateSpin);
        } else {
            wheelStrip.style.transform = `translateX(${targetTranslate}px)`;
            currentTranslateX = targetTranslate;
            spinningActive = false;
            snapToExactCenter();
            updateResultAndNearby();
            cancelAnimationFrame(animFrame);
            animFrame = null;
        }
    }

    function getRandomTitleExcludingLast() {
        if (flatSectors.length === 0) return null;
        if (lastSelectedId === null) {
            return flatSectors[Math.floor(Math.random() * flatSectors.length)];
        }
        const available = flatSectors.filter(s => s.id !== lastSelectedId);
        if (available.length === 0) return flatSectors[Math.floor(Math.random() * flatSectors.length)];
        return available[Math.floor(Math.random() * available.length)];
    }

    function spinWheel() {
        if (spinningActive || spinUsed) return;

        spinUsed = true;
        spinBtn.disabled = true;

        const targetSector = getRandomTitleExcludingLast();
        if (!targetSector) return;

        // Ищем сектор в 8-й копии (индекс 7) для удобства
        let targetDuplicatedIndex = -1;
        const startSearch = flatSectors.length * 7;
        const endSearch = flatSectors.length * 8;
        for (let i = startSearch; i < endSearch; i++) {
            if (duplicatedSectors[i].id === targetSector.id) {
                targetDuplicatedIndex = i;
                break;
            }
        }
        if (targetDuplicatedIndex === -1) {
            for (let i = 0; i < duplicatedSectors.length; i++) {
                if (duplicatedSectors[i].id === targetSector.id) {
                    targetDuplicatedIndex = i;
                    break;
                }
            }
        }
        if (targetDuplicatedIndex === -1) return;

        const trackContainer = document.querySelector('.wheel-track');
        const cards = document.querySelectorAll('.sector-card');
        if (!cards.length || !trackContainer) return;
        const targetCard = cards[targetDuplicatedIndex];
        if (!targetCard) return;

        const containerRect = trackContainer.getBoundingClientRect();
        const cardRect = targetCard.getBoundingClientRect();
        const containerCenter = containerRect.left + containerRect.width / 2;
        const cardCenter = cardRect.left + cardRect.width / 2;
        const delta = cardCenter - containerCenter;
        const desiredTranslate = currentTranslateX - delta;

        // Обороты: 5-10 полных кругов
        const fullRotations = 5 + Math.floor(Math.random() * 6);
        const extraShift = fullRotations * (flatSectors.length * itemWidth);
        const finalTranslate = desiredTranslate - extraShift;

        startTranslate = currentTranslateX;
        targetTranslate = finalTranslate;
        spinStartTime = performance.now();
        spinningActive = true;

        titleDisplaySpan.innerHTML = "🌀 SPINNING... 🌀";
        brawlerDisplaySpan.innerHTML = "Крутим рулетку";
        prestigeTypeSpan.innerHTML = "⚡ СТАВКИ СДЕЛАНЫ ⚡";
        leftTitle.textContent = "—";
        leftBrawler.textContent = "—";
        rightTitle.textContent = "—";
        rightBrawler.textContent = "—";

        if (animFrame) cancelAnimationFrame(animFrame);
        animFrame = requestAnimationFrame(animateSpin);
    }

    // Инициализация
    renderStrip();
    titleDisplaySpan.innerHTML = "—";
    brawlerDisplaySpan.innerHTML = "Ожидание спина";
    prestigeTypeSpan.innerHTML = "✨ ПРАЙМ I / ПРАЙМ III ✨";
    leftTitle.textContent = "—";
    leftBrawler.textContent = "—";
    rightTitle.textContent = "—";
    rightBrawler.textContent = "—";

    let resizeTimeout;
    window.addEventListener('resize', () => {
        if (spinningActive) return;
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
            if (spinUsed) {
                snapToExactCenter();
                updateResultAndNearby();
            }
        }, 100);
    });

    spinBtn.addEventListener('click', spinWheel);
</script>
</body>
</html>
