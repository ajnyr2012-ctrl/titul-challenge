        const rankMap = new Map();
        ['Шелли','Кольт','Булл','Брок','Эль Примо','Барли','Поко','Роза','Джесси'].forEach(b => rankMap.set(b, 'S'));

        // ---------- ПЕРЕВОДЫ ----------

                spin: 'SPIN', spinning: '🌀 КРУТИМ...', waiting: 'Ожидание спина', stakes: '⚡ СТАВКИ СДЕЛАНЫ ⚡'
            },
            en: {

                choose_level_title: '⚡ SELECT LEVEL ⚡', 
                novice: '🔥 NOVICE', master: '⚡ MASTER', old: '💀 OLD', oldplus: '💰 OLD+',
                novice_desc: 'S/A (I)', master_desc: 'B/C (I+III)', old_desc: 'D/F (III)', oldplus_desc: 'All (III)',
                spin: 'SPIN', spinning: '🌀 SPINNING...', waiting: 'Waiting for spin', stakes: '⚡ BETS ARE MADE ⚡'
            }
        };
        let currentLang = 'ru';

        // DOM элементы
        const wheelStrip = document.getElementById('wheelStrip'), spinBtn = document.getElementById('spinBtn');
        const titleDisplay = document.getElementById('titleDisplay'), brawlerDisplay = document.getElementById('brawlerDisplay');
        const prestigeType = document.getElementById('prestigeType'), resultCard = document.getElementById('resultCard');
        const levelBtns = document.querySelectorAll('.level-btn'), langBtns = document.querySelectorAll('.lang-btn');

        let currentLevel = 'novice';
        let flatSectors = buildSectorsForLevel(currentLevel);
        let duplicatedSectors = [];
        for(let i=0; i<15; i++) duplicatedSectors.push(...flatSectors);

        const itemWidth = 188;
        let currentTranslateX = 0, spinningActive = false, animFrame = null, spinStartTime = 0, spinDuration = 2000,
            startTranslate = 0, targetTranslate = 0, spinUsed = false, lastSelectedId = null;

        function buildSectorsForLevel(level) {
            const sectors = [];
            TITLES_LIBRARY.forEach((entry, index) => {
                const ruEntry = TITLES_LIBRARY_RU[index];
                const rank = rankMap.get(ruEntry.brawler) || 'F';
                let includeNormal = false, includeNeon = false;
                if (level === 'novice') { if (rank === 'S' || rank === 'A') includeNormal = true; }
                else if (level === 'master') { if (rank === 'B' || rank === 'C') { includeNormal = true; includeNeon = true; } }
                else if (level === 'old') { if (rank === 'D' || rank === 'F') includeNeon = true; }
                else if (level === 'oldplus') { includeNeon = true; } // любой боец, только третий прайм
                
                if (includeNormal) sectors.push({ 
                    id: ruEntry.brawler+'_normal_'+level, title: entry.normal, brawler: entry.brawler, 
                    type: currentLang === 'ru' ? "🏆 ПРАЙМ I (Мастерство) 🏆" : "🏆 PRIME I (Mastery) 🏆" 
                });
                if (includeNeon) sectors.push({ 
                    id: ruEntry.brawler+'_neon_'+level, title: entry.neon, brawler: entry.brawler, 
                    type: currentLang === 'ru' ? "✨ ПРАЙМ III (Неоновый престиж) ✨" : "✨ PRIME III (Neon Prestige) ✨" 
                });
            });
            return shuffleArray(sectors);
        }
        function shuffleArray(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

        function renderStrip(){
            wheelStrip.innerHTML = '';
            duplicatedSectors.forEach(s => {
                const c = document.createElement('div'); c.className = 'sector-card';
                c.innerHTML = `<span class="title-text">${s.title.length>28?s.title.slice(0,26)+'..':s.title}</span><span class="brawler-mini">${s.brawler}</span>`;
                wheelStrip.appendChild(c);
            });
            const startOffset = -(flatSectors.length * 7 * itemWidth);
            wheelStrip.style.transform = `translateX(${startOffset}px)`; currentTranslateX = startOffset;
        }

        function getCentralSectorIndex(){
            const track = document.querySelector('.wheel-track'); if(!track) return -1;
            const rect = track.getBoundingClientRect(), centerX = rect.left + rect.width/2;
            const cards = document.querySelectorAll('.sector-card'); let best=-1, min=Infinity;
            for(let i=0;i<cards.length;i++){ const cr=cards[i].getBoundingClientRect(), cc=cr.left+cr.width/2, d=Math.abs(cc-centerX); if(d<min){ min=d; best=i; } }
            return best;
        }

        function ensureRightSideFilled(centralIdx){
            const track = document.querySelector('.wheel-track'); if(!track) return false;
            const containerRect = track.getBoundingClientRect(), containerRight = containerRect.right;
            const cards = document.querySelectorAll('.sector-card'); if(!cards.length) return false;
            const centralCard = cards[centralIdx], centralRect = centralCard.getBoundingClientRect();
            if(centralRect.right > containerRight - 10){ currentTranslateX += flatSectors.length * itemWidth; wheelStrip.style.transform = `translateX(${currentTranslateX}px)`; return true; }
            let rightCount = 0;
            for(let i=centralIdx+1; i<cards.length; i++){ if(cards[i].getBoundingClientRect().left < containerRight) rightCount++; else break; }
            if(rightCount < 2){ currentTranslateX += flatSectors.length * itemWidth; wheelStrip.style.transform = `translateX(${currentTranslateX}px)`; return true; }
            return false;
        }

        function updateResult(){
            let idx = getCentralSectorIndex(); if(idx===-1||!duplicatedSectors[idx]) return;
            if(ensureRightSideFilled(idx)) idx = getCentralSectorIndex();
            const sector = duplicatedSectors[idx];
            titleDisplay.textContent = sector.title;
            brawlerDisplay.textContent = `👤 ${sector.brawler}`;
            prestigeType.textContent = sector.type;
            lastSelectedId = sector.id;
            highlightCenterCard();
            resultCard.classList.add('glow-effect');
            setTimeout(()=>resultCard.classList.remove('glow-effect'),500);
        }
        function highlightCenterCard(){
            const cards = document.querySelectorAll('.sector-card');
            cards.forEach(c=>c.classList.remove('highlight'));
            const idx = getCentralSectorIndex();
            if(idx!==-1&&cards[idx]) cards[idx].classList.add('highlight');
        }
        function snapToExactCenter(){
            const idx = getCentralSectorIndex(); if(idx===-1) return;
            const cards = document.querySelectorAll('.sector-card'), targetCard = cards[idx];
            const track = document.querySelector('.wheel-track'), containerRect = track.getBoundingClientRect(),
                  cardRect = targetCard.getBoundingClientRect(),
                  containerCenter = containerRect.left + containerRect.width/2,
                  cardCenter = cardRect.left + cardRect.width/2;
            currentTranslateX -= (cardCenter - containerCenter);
            wheelStrip.style.transform = `translateX(${currentTranslateX}px)`;
        }

        function animateSpin(now){
            if(!spinningActive) return;
            const elapsed = now - spinStartTime, t = Math.min(1, elapsed/spinDuration), ease = 1 - Math.pow(1-t,3);
            const newX = startTranslate + (targetTranslate - startTranslate) * ease;
            wheelStrip.style.transform = `translateX(${newX}px)`; currentTranslateX = newX;
            if(t < 1) animFrame = requestAnimationFrame(animateSpin);
            else {
                wheelStrip.style.transform = `translateX(${targetTranslate}px)`; currentTranslateX = targetTranslate;
                spinningActive = false; snapToExactCenter(); updateResult();
                cancelAnimationFrame(animFrame); animFrame = null;
            }
        }

        function spinWheel(){
            if(spinningActive || spinUsed) return;
            if(!flatSectors.length){ alert(currentLang === 'ru' ? 'Нет доступных титулов!' : 'No titles available!'); return; }
            spinUsed = true; spinBtn.disabled = true;
            const randomIndex = Math.floor(Math.random() * flatSectors.length), targetSector = flatSectors[randomIndex];
            let targetDuplicatedIndex = -1;
            const startSearch = flatSectors.length * 7, endSearch = flatSectors.length * 8;
            for(let i=startSearch; i<endSearch; i++) if(duplicatedSectors[i].id === targetSector.id){ targetDuplicatedIndex = i; break; }
            if(targetDuplicatedIndex === -1) for(let i=0; i<duplicatedSectors.length; i++) if(duplicatedSectors[i].id === targetSector.id){ targetDuplicatedIndex = i; break; }
            if(targetDuplicatedIndex === -1) return;
            const track = document.querySelector('.wheel-track'), cards = document.querySelectorAll('.sector-card'), targetCard = cards[targetDuplicatedIndex];
            const containerRect = track.getBoundingClientRect(), cardRect = targetCard.getBoundingClientRect(),
                  containerCenter = containerRect.left + containerRect.width/2, cardCenter = cardRect.left + cardRect.width/2,
                  desiredTranslate = currentTranslateX - (cardCenter - containerCenter),
                  fullRotations = 5 + Math.floor(Math.random()*6), extraShift = fullRotations * (flatSectors.length * itemWidth),
                  finalTranslate = desiredTranslate - extraShift;
            startTranslate = currentTranslateX; targetTranslate = finalTranslate; spinStartTime = performance.now(); spinningActive = true;
            titleDisplay.textContent = i18n[currentLang].spinning;
            brawlerDisplay.textContent = i18n[currentLang].waiting;
            prestigeType.textContent = i18n[currentLang].stakes;
            if(animFrame) cancelAnimationFrame(animFrame);
            animFrame = requestAnimationFrame(animateSpin);
        }

        function setLevel(level){
            currentLevel = level;
            flatSectors = buildSectorsForLevel(level);
            duplicatedSectors = [];
            for(let i=0; i<15; i++) duplicatedSectors.push(...flatSectors);
            renderStrip();
            spinUsed = false; spinBtn.disabled = false;
            titleDisplay.textContent = "—";
            brawlerDisplay.textContent = i18n[currentLang].choose_level;
            prestigeType.textContent = "✨ — ✨";
            document.querySelectorAll('.sector-card').forEach(c=>c.classList.remove('highlight'));
        }

        function applyLanguage(lang){
            currentLang = lang;
            TITLES_LIBRARY = (lang === 'ru') ? TITLES_LIBRARY_RU : TITLES_LIBRARY_EN;
            document.querySelectorAll('[data-i18n]').forEach(el => { 
                const key = el.dataset.i18n; 
                if (i18n[lang][key]) el.textContent = i18n[lang][key]; 
            });
            spinBtn.textContent = i18n[lang].spin;
            if(!spinUsed) brawlerDisplay.textContent = i18n[lang].choose_level;
            flatSectors = buildSectorsForLevel(currentLevel);
            duplicatedSectors = [];
            for(let i=0; i<15; i++) duplicatedSectors.push(...flatSectors);
            renderStrip();
            if(spinUsed) updateResult();
        }

        levelBtns.forEach(btn => btn.addEventListener('click', ()=>{ 
            levelBtns.forEach(b=>b.classList.remove('active')); 
            btn.classList.add('active'); 
            setLevel(btn.dataset.level); 
        }));
        spinBtn.addEventListener('click', spinWheel);
        window.addEventListener('resize', ()=>{ if(spinningActive) return; if(spinUsed){ snapToExactCenter(); updateResult(); } });
        langBtns.forEach(btn => btn.addEventListener('click', ()=>{ 
            const lang = btn.dataset.lang; 
            langBtns.forEach(b=>b.classList.remove('active')); 
            btn.classList.add('active'); 
            applyLanguage(lang); 
        }));
        setLevel('novice');
        applyLanguage('ru');
    })();
